<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI — Live Visual Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

:root {
  --teal: #00C9B1;
  --orange: #FF5C2B;
  --yellow: #FFD166;
  --dark: #080A0F;
  --card: #0E1117;
  --border: #1A2030;
  --muted: #4A5568;
  --text: #CBD5E0;
  --white: #FFFFFF;
  --green: #48BB78;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
  overflow-x: hidden;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,201,177,0.015) 2px, rgba(0,201,177,0.015) 4px);
  pointer-events: none;
  z-index: 0;
}

.wrapper { width: 100%; max-width: 860px; position: relative; z-index: 1; }

/* ── HEADER ── */
.hdr { text-align: center; margin-bottom: 2.5rem; }
.hdr-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.6rem; }
.hdr h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 800; color: var(--white); line-height: 1.1; }
.hdr h1 span { color: var(--teal); }
.hdr-sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }

/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center; justify-content: center;
  gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
}
.btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  padding: 0.6rem 1.4rem; border: 1px solid var(--teal); background: transparent;
  color: var(--teal); cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
  transition: all 0.2s;
}
.btn:hover, .btn.active { background: var(--teal); color: var(--dark); }
.btn.secondary { border-color: var(--orange); color: var(--orange); }
.btn.secondary:hover { background: var(--orange); color: var(--dark); }
.speed-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); }

/* ── FUNCTION TOGGLE ── */
.fn-tabs { display: flex; gap: 1px; background: var(--border); margin-bottom: 1.5rem; }
.fn-tab {
  flex: 1; padding: 0.75rem; text-align: center; cursor: pointer;
  font-size: 0.78rem; font-weight: 700; color: var(--muted);
  background: var(--card); transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.fn-tab.active.f1 { color: var(--teal); border-color: var(--teal); background: rgba(0,201,177,0.05); }
.fn-tab.active.f2 { color: var(--orange); border-color: var(--orange); background: rgba(255,92,43,0.05); }

/* ── PROGRESS STEPS ── */
.progress { display: flex; gap: 0; margin-bottom: 1.5rem; }
.prog-step {
  flex: 1; height: 4px; background: var(--border); position: relative;
  transition: background 0.3s;
}
.prog-step.done.f1 { background: var(--teal); }
.prog-step.done.f2 { background: var(--orange); }
.prog-step.current { animation: pulse-bar 1s ease infinite; }
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── MAIN STAGE ── */
.stage {
  background: var(--card);
  border: 1px solid var(--border);
  min-height: 420px;
  position: relative;
  overflow: hidden;
}

.stage-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 1.2rem;
  background: var(--dark);
  border-bottom: 1px solid var(--border);
}
.stage-fn { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; }
.stage-step-num { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); }
.dots { display: flex; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }

.stage-body { padding: 1.8rem; min-height: 380px; }

/* Step panel */
.step-panel { display: none; animation: fadeSlide 0.4s ease; }
.step-panel.show { display: block; }
@keyframes fadeSlide { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

.step-title { font-size: 1.3rem; font-weight: 800; color: var(--white); margin-bottom: 0.3rem; }
.step-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 1.5rem; letter-spacing: 0.05em; }

/* CV card */
.cv-card {
  background: var(--dark); border: 1px solid var(--border); padding: 1.2rem;
  display: grid; grid-template-columns: auto 1fr; gap: 1rem; align-items: start;
}
.cv-avatar {
  width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #00C9B1, #007A6E);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: 800; color: var(--dark); flex-shrink: 0;
}
.cv-name { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 0.2rem; }
.cv-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); line-height: 1.8; }
.cv-status { display: inline-block; background: rgba(255,92,43,0.15); color: var(--orange); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 0.2rem 0.5rem; margin-top: 0.4rem; }
.skill-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
.chip { background: rgba(0,201,177,0.1); border: 1px solid rgba(0,201,177,0.2); color: var(--teal); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 0.25rem 0.6rem; animation: popIn 0.3s ease both; }
@keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
.chip.gap { background: rgba(255,92,43,0.1); border-color: rgba(255,92,43,0.2); color: var(--orange); }
.chip.new { background: rgba(72,187,120,0.1); border-color: rgba(72,187,120,0.2); color: var(--green); }

/* Match meter */
.match-box { margin-top: 1.2rem; }
.match-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.1em; text-transform: uppercase; }
.match-bar-track { height: 28px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); position: relative; margin-bottom: 0.4rem; }
.match-bar-fill { height: 100%; position: absolute; left:0; top:0; transition: width 1.5s cubic-bezier(.4,0,.2,1); display: flex; align-items: center; padding-left: 0.5rem; }
.match-pct { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; color: var(--dark); }
.match-note { font-size: 0.75rem; color: var(--muted); }

/* Rejection vs Accept */
.verdict { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
.verdict-box { flex: 1; min-width: 180px; padding: 0.9rem 1rem; border: 1px solid; }
.verdict-box.reject { border-color: rgba(255,92,43,0.3); background: rgba(255,92,43,0.05); }
.verdict-box.accept { border-color: rgba(0,201,177,0.3); background: rgba(0,201,177,0.05); }
.verdict-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700; margin-bottom: 0.3rem; }

/* Training modules */
.training-modules { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
.module {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 0.75rem;
  background: var(--dark); border: 1px solid var(--border); padding: 0.75rem 1rem;
  animation: slideIn 0.4s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.mod-num { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--teal); width: 20px; }
.mod-name { font-size: 0.82rem; color: var(--white); font-weight: 700; }
.mod-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
.mod-dur { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--yellow); white-space: nowrap; }

/* Before/After */
.ba-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin-top: 0.5rem; }
.ba-box { background: var(--dark); padding: 1.2rem; text-align: center; }
.ba-score { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; line-height: 1; }
.ba-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
.ba-change { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; color: var(--green); margin-top: 0.3rem; }

/* Job ranking */
.job-cards { display: flex; flex-direction: column; gap: 0.5rem; }
.job-card {
  display: grid; grid-template-columns: 28px 1fr auto;
  align-items: center; gap: 1rem;
  background: var(--dark); border: 1px solid var(--border); padding: 0.85rem 1rem;
  animation: slideIn 0.4s ease both;
}
.job-rank { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); }
.job-title-text { font-size: 0.85rem; font-weight: 700; color: var(--white); margin-bottom: 0.2rem; }
.job-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
.job-score-wrap { text-align: right; }
.job-score { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; }
.job-bar { height: 3px; margin-top: 4px; transition: width 1s ease; }

/* Scan animation */
.scan-box { text-align: center; padding: 2rem; }
.scan-counter { font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 700; color: var(--teal); }
.scan-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }
.scan-progress { margin: 1.5rem auto; max-width: 400px; }
.scan-bar-track { height: 6px; background: var(--border); position: relative; overflow: hidden; }
.scan-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--yellow)); width: 0; transition: width 2s ease; }
.scan-dots { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem; }
.scan-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: blink 1.2s ease infinite; }
.scan-dot:nth-child(2) { animation-delay: 0.2s; }
.scan-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* Candidate list */
.cand-list { display: flex; flex-direction: column; gap: 0.5rem; }
.cand-card {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 1rem;
  background: var(--dark); border: 1px solid var(--border); padding: 0.85rem 1rem;
  animation: slideIn 0.4s ease both;
}
.cand-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
.cand-name { font-size: 0.85rem; font-weight: 700; color: var(--white); }
.cand-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
.cand-scores { text-align: right; }
.cand-before { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--orange); }
.cand-after { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--teal); }

/* Email */
.email-box {
  background: #040a08; border: 1px solid rgba(0,201,177,0.3); padding: 1.3rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; line-height: 1.7;
}
.email-subject { color: var(--teal); font-weight: 700; margin-bottom: 0.8rem; }
.email-field { color: var(--yellow); }
.email-val { color: var(--white); }
.email-highlight { color: var(--teal); font-weight: 700; }

/* Results */
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
@media(max-width:500px){ .result-grid { grid-template-columns: 1fr; } }
.result-cell { background: var(--dark); padding: 1rem; }
.result-name { font-size: 0.82rem; font-weight: 700; color: var(--white); margin-bottom: 0.4rem; }
.result-arrow { display: flex; align-items: center; gap: 0.5rem; }
.result-before { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--orange); }
.result-after { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--teal); }
.result-arr { color: var(--muted); }
.result-change { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--green); }

/* BOTTOM NAV */
.nav { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; }
.nav-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; padding: 0.55rem 1.2rem;
  border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--teal); color: var(--teal); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-info { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: center; }

/* Insight box */
.insight {
  margin-top: 1.2rem; padding: 0.9rem 1rem;
  border-left: 2px solid var(--teal); background: rgba(0,201,177,0.04);
  font-size: 0.8rem; color: var(--text); line-height: 1.5;
}
.insight strong { color: var(--teal); }

</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-tag">Auvergne-Rhône-Alpes · AI Demo · 2026</div>
    <h1>AURA AI <span>Skills Bridge</span></h1>
    <div class="hdr-sub">Watch the AI system run — step by step</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn" id="btn-play" onclick="startAuto()">▶ Auto Play</button>
    <button class="btn secondary" onclick="resetDemo()">↺ Reset</button>
    <span class="speed-label">Speed:</span>
    <button class="btn" id="spd-1" onclick="setSpeed(2000)" style="padding:0.4rem 0.8rem">1×</button>
    <button class="btn" id="spd-2" onclick="setSpeed(1000)" style="padding:0.4rem 0.8rem">2×</button>
    <button class="btn" id="spd-3" onclick="setSpeed(500)" style="padding:0.4rem 0.8rem">3×</button>
  </div>

  <!-- FUNCTION TABS -->
  <div class="fn-tabs">
    <div class="fn-tab f1 active" id="tab-f1">FUNCTION 1 — CV Screening + Training</div>
    <div class="fn-tab f2" id="tab-f2">FUNCTION 2 — Proactive Outreach</div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress" id="progress"></div>

  <!-- MAIN STAGE -->
  <div class="stage">
    <div class="stage-header">
      <div class="dots">
        <div class="dot" style="background:#FF5F57"></div>
        <div class="dot" style="background:#FFBD2E"></div>
        <div class="dot" style="background:#28C840"></div>
      </div>
      <div class="stage-fn" id="stage-fn-label" style="color:var(--teal)">FUNCTION 1 · CV SCREENING</div>
      <div class="stage-step-num" id="stage-step-num">STEP 1 / 9</div>
    </div>
    <div class="stage-body" id="stage-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nav-btn" id="btn-prev" onclick="prevStep()" disabled>← PREV</button>
    <div class="nav-info" id="nav-info">Click NEXT or Auto Play</div>
    <button class="nav-btn" id="btn-next" onclick="nextStep()">NEXT →</button>
  </div>

</div>

<script>
let currentStep = 0;
let autoTimer = null;
let autoSpeed = 2000;
const TOTAL_STEPS = 9;

// ── STEP CONTENT ────────────────────────────────────────────────
const steps = [

  // STEP 1 — CV Received
  () => `
    <div class="step-panel show">
      <div class="step-title">CV Received</div>
      <div class="step-subtitle">STEP 01 · AI ingests candidate profile · NLP engine activates</div>
      <div class="cv-card">
        <div class="cv-avatar">AM</div>
        <div>
          <div class="cv-name">Alex Martin</div>
          <div class="cv-meta">
            Age: 34 · Lyon, AURA<br>
            Last job: Auto Body Worker<br>
            Experience: 8 years<br>
            Education: BEP Carrosserie
          </div>
          <div class="cv-status">⚠ Unemployed — 4 months</div>
        </div>
      </div>
      <div class="insight">AI receives the CV and begins processing. The goal is not to find a perfect match — it's to find the <strong>best possible bridge</strong> between this person's skills and what the market needs.</div>
    </div>`,

  // STEP 2 — Skill extraction + match
  () => `
    <div class="step-panel show">
      <div class="step-title">Skill Extraction & Match Score</div>
      <div class="step-subtitle">STEP 02 · NLP extracts skills from CV · Computes match against open jobs</div>
      <div style="margin-bottom:0.75rem">
        <div class="match-label">Skills extracted from CV</div>
        <div class="skill-chips">
          ${["Panel beating","Welding","Surface prep","Quality finishing","Vehicle assessment"].map((s,i) =>
            `<div class="chip" style="animation-delay:${i*0.1}s">${s}</div>`).join('')}
        </div>
      </div>
      <div class="match-box">
        <div class="match-label">Target: Machine Setter (Régleur) · 297 openings/yr · 84.2% difficulty</div>
        <div class="match-bar-track">
          <div class="match-bar-fill" id="mbar1" style="width:0;background:var(--orange)">
            <span class="match-pct">50%</span>
          </div>
        </div>
        <div class="match-note">3 of 6 required skills matched</div>
      </div>
      <div class="verdict">
        <div class="verdict-box reject">
          <div class="verdict-label" style="color:var(--orange)">❌ TRADITIONAL ATS</div>
          <div style="font-size:0.78rem">Score below 70% threshold.<br><strong style="color:var(--orange)">AUTO-REJECTED.</strong> Application never seen by HR.</div>
        </div>
        <div class="verdict-box accept">
          <div class="verdict-label" style="color:var(--teal)">✓ AURA AI</div>
          <div style="font-size:0.78rem">Score below threshold?<br><strong style="color:var(--teal)">DON'T REJECT — identify the gap.</strong></div>
        </div>
      </div>
    </div>`,

  // STEP 3 — Training
  () => `
    <div class="step-panel show">
      <div class="step-title">Training Recommendation</div>
      <div class="step-subtitle">STEP 03 · AI maps skill gaps to CPF-funded training modules</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:0.8rem">GAP: 3 missing skills · TOTAL TRAINING: 8 weeks · COST TO CANDIDATE: €0</div>
      <div class="training-modules">
        ${[
          ["Technical Drawing & CAD Basics","Covers blueprint reading, 2D/3D technical plans","2 weeks"],
          ["Industrial Machine Calibration","Precision setups, tolerances, gauges","2 weeks"],
          ["Metal Tooling Techniques","Cutting tools, inserts, wear patterns","2 weeks"],
          ["Preventive Maintenance Systems","Scheduled upkeep, fault prevention","2 weeks"],
        ].map(([name,sub,dur],i) => `
          <div class="module" style="animation-delay:${i*0.15}s">
            <div class="mod-num">${i+1}</div>
            <div><div class="mod-name">${name}</div><div class="mod-sub">${sub}</div></div>
            <div class="mod-dur">${dur}</div>
          </div>`).join('')}
      </div>
      <div class="insight">All training modules are sourced from the <strong>Carif-Oref AURA catalog</strong> and funded through France Travail / CPF. No cost to the candidate.</div>
    </div>`,

  // STEP 4 — After training
  () => `
    <div class="step-panel show">
      <div class="step-title">Match Score After Training</div>
      <div class="step-subtitle">STEP 04 · AI recomputes match · Candidate profile updated</div>
      <div class="skill-chips" style="margin-bottom:1rem">
        ${["Panel beating","Welding","Surface prep","Quality finishing","Vehicle assessment"].map(s =>
          `<div class="chip">${s}</div>`).join('')}
        ${["Technical drawing","Machine calibration","Metal tooling","Prev. maintenance"].map(s =>
          `<div class="chip new">+ ${s}</div>`).join('')}
      </div>
      <div class="ba-compare">
        <div class="ba-box">
          <div class="ba-score" style="color:var(--orange)">50%</div>
          <div class="ba-lbl">Before training</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);margin-top:0.3rem">3 / 6 skills</div>
        </div>
        <div class="ba-box" style="border-left:1px solid var(--border)">
          <div class="ba-score" style="color:var(--teal)" id="scoreAfter">0%</div>
          <div class="ba-lbl">After training</div>
          <div class="ba-change" id="scoreChange"></div>
        </div>
      </div>
      <div class="match-box" style="margin-top:1rem">
        <div class="match-label">Updated match score</div>
        <div class="match-bar-track">
          <div class="match-bar-fill" id="mbar2" style="width:0;background:var(--teal)">
            <span class="match-pct">83%</span>
          </div>
        </div>
      </div>
    </div>`,

  // STEP 5 — Re-match
  () => `
    <div class="step-panel show">
      <div class="step-title">AI Re-matches to Open Positions</div>
      <div class="step-subtitle">STEP 05 · Rescanning all 6 open jobs in AURA · Ranking by score</div>
      <div class="job-cards">
        ${[
          ["Auto Body Worker (Carrossier)","€1,950–2,250/mo · 767 openings/yr",83,"var(--teal)"],
          ["Machine Setter (Régleur)",     "€2,100–2,400/mo · 297 openings/yr",67,"var(--yellow)"],
          ["Welder (Soudeur)",             "€1,900–2,200/mo · 706 openings/yr",17,"var(--muted)"],
        ].map(([title,meta,score,c],i) => `
          <div class="job-card" style="animation-delay:${i*0.2}s">
            <div class="job-rank" style="color:${c}">#${i+1}</div>
            <div>
              <div class="job-title-text">${title}</div>

      </div>
      <div class="insight"><strong>Alex Martin</strong> matched to Auto Body Worker (83%). Profile sent to employer. Transition complete — <strong>Function 1 done.</strong></div>
    </div>`,

  // STEP 6 — Monthly scan
  () => `

    </div>`,

  // STEP 7 — Candidates found
  () => `
    <div class="step-panel show">
      <div class="step-title">Partial Matches Identified</div>
      <div class="step-subtitle">STEP 07 · 5 candidates selected · All have transferable skills invisible to standard HR</div>
      <div class="cand-list">
        ${[
          ["KB","Karim Benali","41 · Grenoble · Garage mechanic","Sheet Metal / Boilermaker","33%","83%","#E9D8A6"],
          ["ML","Marie Lefort","27 · Saint-Étienne · Apprentice welder","Welder (Soudeur)","50%","100%","#94D2BD"],
          ["TG","Thomas Garnier","38 · Chambéry · BTP laborer","Roofer (Couvreur)","50%","100%","#0A9396"],
          ["IF","Isabelle Faure","32 · Valence · Manufacturing QC","Machine Setter (Régleur)","50%","100%","#AE2012"],
        ].map(([init,name,meta,job,before,after,bg],i) => `

            <div>
              <div class="cand-name">${name}</div>

            <div class="cand-scores">
              <div class="cand-before">${before}</div>

  // STEP 8 — Email
  () => `

  // STEP 9 — Results

const stepMeta = [
  { fn:1, label:"FUNCTION 1 · CV SCREENING" },
  { fn:1, label:"FUNCTION 1 · SKILL EXTRACTION" },
  { fn:1, label:"FUNCTION 1 · TRAINING PLAN" },
  { fn:1, label:"FUNCTION 1 · POST-TRAINING SCORE" },
  { fn:1, label:"FUNCTION 1 · RE-MATCHING" },
  { fn:2, label:"FUNCTION 2 · MONTHLY SCAN" },
  { fn:2, label:"FUNCTION 2 · CANDIDATES FOUND" },
  { fn:2, label:"FUNCTION 2 · OUTREACH EMAIL" },
  { fn:2, label:"FUNCTION 2 · FINAL RESULTS" },
];

// ── INIT ──────────────────────────────────────────────────────
function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.createElement('div');
    d.className = 'prog-step';
    d.id = `prog-${i}`;
    d.style.marginRight = '2px';
    el.appendChild(d);
  }
}

function renderStep(i) {
  const body = document.getElementById('stage-body');
  body.innerHTML = steps[i]();

  const meta = stepMeta[i];
  const fnLabel = document.getElementById('stage-fn-label');
  fnLabel.textContent = meta.label;
  fnLabel.style.color = meta.fn === 1 ? 'var(--teal)' : 'var(--orange)';

  document.getElementById('stage-step-num').textContent = `STEP ${i+1} / ${TOTAL_STEPS}`;
  document.getElementById('nav-info').textContent = `Step ${i+1} of ${TOTAL_STEPS} — ${meta.label}`;

  // Update tabs
  document.getElementById('tab-f1').classList.toggle('active', meta.fn === 1);
  document.getElementById('tab-f2').classList.toggle('active', meta.fn === 2);

  // Update progress
  for (let j = 0; j < TOTAL_STEPS; j++) {
    const pd = document.getElementById(`prog-${j}`);
    const fn = stepMeta[j].fn;
    pd.className = 'prog-step';
    if (j < i) { pd.classList.add('done', fn === 1 ? 'f1' : 'f2'); }
    if (j === i) { pd.classList.add('current'); }
  }

  // Step-specific animations
  setTimeout(() => {
    if (i === 1) { // Match bar
      const b = document.getElementById('mbar1');
      if (b) b.style.width = '50%';
    }
    if (i === 3) { // After training score
      const b = document.getElementById('mbar2');
      if (b) b.style.width = '83%';
      const scoreEl = document.getElementById('scoreAfter');
      const changeEl = document.getElementById('scoreChange');
      if (scoreEl) {
        let n = 0;
        const iv = setInterval(() => {
          n = Math.min(n + 3, 83);
          scoreEl.textContent = n + '%';
          if (n >= 83) { clearInterval(iv); if (changeEl) changeEl.textContent = '+33pts ↑'; }
        }, 30);
      }
    }
    if (i === 5) { // Scan animation
      const bar = document.getElementById('scan-bar');
      const count = document.getElementById('scan-count');
      const pct = document.getElementById('scan-pct');
      if (bar) bar.style.width = '100%';
      if (count) {
        let n = 0;
        const iv = setInterval(() => {
          n = Math.min(n + 3847, 293000);
          count.textContent = n.toLocaleString();
          if (pct) pct.textContent = Math.round(n/293000*100) + '%';
          if (n >= 293000) clearInterval(iv);
        }, 20);
      }
    }
  }, 200);

  // Buttons
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === TOTAL_STEPS - 1;
  if (i === TOTAL_STEPS - 1 && autoTimer) stopAuto();
}

function nextStep() {
  if (currentStep < TOTAL_STEPS - 1) {
    currentStep++;
    renderStep(currentStep);
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
  }
}

function startAuto() {
  const btn = document.getElementById('btn-play');
  if (autoTimer) {
    stopAuto();
    return;
  }
  btn.textContent = '⏸ Pause';
  btn.classList.add('active');
  autoTimer = setInterval(() => {
    if (currentStep < TOTAL_STEPS - 1) {
      nextStep();
    } else {
      stopAuto();
    }
  }, autoSpeed);
}

function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
  const btn = document.getElementById('btn-play');
  btn.textContent = '▶ Auto Play';
  btn.classList.remove('active');
}

function setSpeed(ms) {
  autoSpeed = ms;
  ['spd-1','spd-2','spd-3'].forEach(id => document.getElementById(id).classList.remove('active'));
  const map = {2000:'spd-1', 1000:'spd-2', 500:'spd-3'};
  document.getElementById(map[ms]).classList.add('active');
  if (autoTimer) { stopAuto(); startAuto(); }
}

function resetDemo() {
  stopAuto();
  currentStep = 0;
  renderStep(0);
}

// INIT
buildProgress();
renderStep(0);
document.getElementById('spd-1').classList.add('active');
</script>
</body>
</html>
